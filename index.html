<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sael — A Conversa</title>
<style>
/* ============================================================
   SAEL — O TECELÃO / A Conversa com Henka
   Estética: livro de registos da Cidadela. Pena, tinta, pedra.
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap');

:root{
  --tinta:        #1a1714;   /* tinta quase preta */
  --tinta-fraca:  #4a4038;   /* tinta diluída */
  --pergaminho:   #d8cfbf;   /* texto claro sobre escuro */
  --pedra:        #0c0a08;   /* fundo, pedra na sombra */
  --pedra-clara:  #18140f;
  --ambar:        #c9a45f;   /* luz âmbar — o destaque do livro */
  --ambar-fraco:  #8a7340;
  --sangue:       #6e2b22;   /* vermelho seco, contido */
  --cinza-frio:   #5a5e63;   /* azul-cinza do vestido dela */
  --linha:        rgba(201,164,95,0.22);
}

*{ margin:0; padding:0; box-sizing:border-box; }

html,body{ height:100%; }

body{
  background:var(--pedra);
  color:var(--pergaminho);
  font-family:'EB Garamond', Georgia, serif;
  font-size:22px;
  line-height:1.6;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

#stage{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ---------- CAMADA DE VÍDEO ---------- */
#videoLayer{
  position:absolute;
  inset:0;
  z-index:1;
  background:#000;
}
#videoLayer video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}
/* vinheta para integrar vídeo ao texto */
#vignette{
  position:absolute;
  inset:0;
  z-index:2;
  pointer-events:none;
  background:
    radial-gradient(ellipse 120% 80% at 50% 38%, transparent 30%, rgba(8,6,4,0.35) 70%, rgba(8,6,4,0.78) 100%),
    linear-gradient(to bottom, rgba(8,6,4,0.25) 0%, transparent 22%, transparent 55%, rgba(8,6,4,0.92) 100%);
}

/* ---------- CAMADA DE TEXTO / UI ---------- */
#ui{
  position:absolute;
  inset:0;
  z-index:3;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:0;
}

/* painel inferior onde a narração e as falas aparecem */
#panel{
  width:100%;
  max-width:none;
  padding:clamp(20px,4vw,56px) clamp(20px,6vw,90px) clamp(28px,5vh,64px);
  background:linear-gradient(to top, rgba(8,6,4,0.96) 60%, rgba(8,6,4,0.0) 100%);
}
#panelInner{
  max-width:760px;
  margin:0 auto;
}

/* etiqueta de quem fala / contexto */
.eyebrow{
  font-family:'Cormorant Garamond', serif;
  font-size:0.72rem;
  letter-spacing:0.42em;
  text-transform:uppercase;
  color:var(--ambar-fraco);
  margin-bottom:1.1em;
  display:flex;
  align-items:center;
  gap:0.9em;
}
.eyebrow::after{
  content:"";
  flex:1;
  height:1px;
  background:var(--linha);
}

/* texto de narração de Sael (itálico, voz interior) */
.narration{
  font-style:italic;
  font-size:clamp(1.2rem,2.4vw,1.55rem);
  line-height:1.72;
  color:var(--pergaminho);
  margin-bottom:0.9em;
}
.narration:last-child{ margin-bottom:0; }

/* texto de Henka — ação/fala, romano */
.henka{
  font-size:clamp(1.2rem,2.4vw,1.52rem);
  line-height:1.7;
  color:#e6ddcc;
  margin-bottom:0.6em;
}
.henka::before{
  content:"HENKA — ";
  font-family:'Cormorant Garamond', serif;
  font-size:0.62em;
  letter-spacing:0.28em;
  color:var(--cinza-frio);
  display:block;
  margin-bottom:0.3em;
}

/* fala de Toven dentro do resultado */
.toven-line{
  font-size:clamp(1.15rem,2.3vw,1.42rem);
  color:var(--ambar);
  margin-bottom:0.9em;
  line-height:1.65;
}
.toven-line::before{
  content:"TOVEN — ";
  font-family:'Cormorant Garamond', serif;
  font-size:0.62em;
  letter-spacing:0.28em;
  color:var(--ambar-fraco);
  display:block;
  margin-bottom:0.3em;
}

/* ---------- OPÇÕES ---------- */
#choices{
  display:flex;
  flex-direction:column;
  gap:0.7em;
  margin-top:1.6em;
}
.choice{
  position:relative;
  text-align:left;
  background:linear-gradient(to right, rgba(201,164,95,0.05), rgba(201,164,95,0.01));
  border:1px solid var(--linha);
  border-left:2px solid var(--ambar-fraco);
  color:#e6ddcc;
  font-family:'EB Garamond', serif;
  font-size:clamp(1.12rem,2.2vw,1.34rem);
  line-height:1.55;
  padding:0.9em 1.3em 0.9em 2.6em;
  cursor:pointer;
  transition:border-color .35s ease, background .35s ease, transform .2s ease, color .35s ease;
}
.choice::before{
  content:"❦";
  position:absolute;
  left:1em;
  top:50%;
  transform:translateY(-50%);
  color:var(--ambar-fraco);
  font-size:0.85em;
  opacity:0.6;
  transition:opacity .35s ease, color .35s ease;
}
.choice:hover{
  border-left-color:var(--ambar);
  border-color:rgba(201,164,95,0.4);
  background:linear-gradient(to right, rgba(201,164,95,0.12), rgba(201,164,95,0.02));
  transform:translateX(4px);
  color:#fff;
}
.choice:hover::before{ opacity:1; color:var(--ambar); }
.choice:focus-visible{
  outline:none;
  border-left-color:var(--ambar);
  border-color:var(--ambar);
}

/* botão de avançar a narração */
#advance{
  margin-top:1.7em;
  display:inline-flex;
  align-items:center;
  gap:0.7em;
  background:none;
  border:none;
  color:var(--ambar);
  font-family:'Cormorant Garamond', serif;
  font-size:0.78rem;
  letter-spacing:0.34em;
  text-transform:uppercase;
  cursor:pointer;
  padding:0.4em 0;
  transition:color .3s ease, gap .3s ease;
}
#advance:hover{ color:#fff; gap:1.1em; }
#advance::after{ content:"→"; font-size:1.2em; }
#advance:focus-visible{ outline:1px solid var(--ambar); outline-offset:6px; }

/* ---------- TELA DE TÍTULO ---------- */
#title{
  position:absolute;
  inset:0;
  z-index:5;
  background:radial-gradient(ellipse at 50% 40%, var(--pedra-clara), var(--pedra) 75%);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:6vw;
  transition:opacity 1.2s ease;
}
#title .kicker{
  font-family:'Cormorant Garamond', serif;
  font-size:0.8rem;
  letter-spacing:0.5em;
  text-transform:uppercase;
  color:var(--ambar-fraco);
  margin-bottom:2em;
}
#title h1{
  font-family:'Cormorant Garamond', serif;
  font-weight:500;
  font-size:clamp(2.6rem,9vw,5.6rem);
  line-height:0.98;
  letter-spacing:0.02em;
  color:var(--pergaminho);
  margin-bottom:0.32em;
}
#title h1 em{
  display:block;
  font-style:italic;
  font-size:0.42em;
  letter-spacing:0.16em;
  color:var(--ambar);
  margin-top:1.2em;
}
#title .sub{
  font-family:'EB Garamond', serif;
  font-style:italic;
  font-size:clamp(1rem,2.4vw,1.25rem);
  color:var(--tinta-fraca);
  color:#9c8f7a;
  max-width:30em;
  margin:0 auto 3.2em;
  line-height:1.6;
}
.btn{
  background:none;
  border:1px solid var(--ambar-fraco);
  color:var(--ambar);
  font-family:'Cormorant Garamond', serif;
  font-size:0.92rem;
  letter-spacing:0.32em;
  text-transform:uppercase;
  padding:1em 2.6em;
  cursor:pointer;
  transition:all .4s ease;
}
.btn:hover{
  background:var(--ambar);
  color:var(--pedra);
  border-color:var(--ambar);
  letter-spacing:0.4em;
}
.btn:focus-visible{ outline:2px solid var(--ambar); outline-offset:4px; }

/* ---------- TELA DE DESFECHO ---------- */
#ending{
  position:absolute;
  inset:0;
  z-index:6;
  background:var(--pedra);
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:clamp(30px,8vw,90px);
  overflow-y:auto;
  opacity:0;
  transition:opacity 1.4s ease;
}
#ending .verdict{
  font-family:'Cormorant Garamond', serif;
  font-size:0.78rem;
  letter-spacing:0.46em;
  text-transform:uppercase;
  margin-bottom:2.4em;
}
#ending.win .verdict{ color:var(--ambar); }
#ending.lose .verdict{ color:var(--sangue); }
#ending .endText{
  max-width:38em;
  font-size:clamp(1.18rem,2.5vw,1.5rem);
  line-height:1.74;
  color:#e6ddcc;
  margin-bottom:1.4em;
}
#ending .endText.sael{
  font-style:italic;
  color:var(--ambar);
  color:#c9a45f;
  margin-bottom:3em;
  border-top:1px solid var(--linha);
  padding-top:1.8em;
  max-width:34em;
}

/* fades */
.fade-text{ animation:fadeIn 1s ease both; }
@keyframes fadeIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }

.hidden{ display:none !important; }

/* skip intro */
#skip{
  position:absolute;
  bottom:24px;
  right:28px;
  z-index:4;
  background:none;
  border:none;
  color:rgba(216,207,191,0.4);
  font-family:'Cormorant Garamond', serif;
  font-size:0.72rem;
  letter-spacing:0.24em;
  text-transform:uppercase;
  cursor:pointer;
  transition:color .3s ease;
}
#skip:hover{ color:var(--ambar); }

@media (max-width:640px){
  body{ font-size:19px; }
  #panel{ padding:24px 22px 34px; }
  .choice{ padding:0.8em 1em 0.8em 2.3em; }
}

@media (prefers-reduced-motion:reduce){
  *{ animation-duration:0.01ms !important; transition-duration:0.08s !important; }
}
</style>
</head>
<body>

<div id="stage">

  <!-- camada de vídeo -->
  <div id="videoLayer">
    <video id="vidIntro" playsinline style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:1;transition:opacity 0.8s ease;"></video>
    <video id="vidA" playsinline muted></video>
    <video id="vidB" playsinline muted></video>
    <audio id="ambient" src="jogo2soundambient.wav" loop preload="auto"></audio>
  </div>
  <div id="vignette"></div>

  <!-- UI de texto -->
  <div id="ui" class="hidden">
    <div id="panel">
      <div id="panelInner">
        <div class="eyebrow" id="eyebrow">Sael</div>
        <div id="content"></div>
        <div id="choices"></div>
        <button id="advance" class="hidden">continuar</button>
      </div>
    </div>
  </div>

  <button id="skip" class="hidden">saltar ▸</button>

  <!-- tela de título -->
  <div id="title">
    <div class="kicker">As Quatro Vontades</div>
    <h1>Sael<em>A Conversa</em></h1>
    <p class="sub">Há uma ala da Cidadela que consome velas, pão e carcereiros — e não aparece em registo nenhum. Quem guarda o livro sabe mais do que quem guarda a chave.</p>
    <button class="btn" id="startBtn">Sentar-se à mesa</button>
  </div>

  <!-- tela de desfecho -->
  <div id="ending">
    <div class="verdict" id="verdict"></div>
    <div class="endText fade-text" id="endHenka"></div>
    <div class="endText sael fade-text" id="endSael"></div>
    <button class="btn" id="againBtn">Outra tarde, outra cara</button>
  </div>

</div>

<script>
// =====================================================================
// SAEL — O TECELÃO / A Conversa com Henka
// Modelo de dados de diálogo completo
// =====================================================================
//
// Estrutura:
//  - Cada PERFIL (A/B/C) tem texto de intro próprio (beat 0)
//  - Cada BEAT tem opções; cada opção tem: fala de Toven, delta, vídeo,
//    e a resposta de Henka (que pode depender do estado de entrada)
//  - O "estado de entrada" do beat 2+ depende de qual opção foi escolhida
//    no beat anterior (ramificação de continuidade narrativa)
//
// Vídeos disponíveis (mesma pasta do index.html):
//   IntroVIFINAL.mp4        -> abertura com legenda
//   NeutraLoopingZoom.mp4   -> loop base / estado neutro
//   AberturaZoom.mp4        -> abertura leve (+1)
//   aberturaforteZoom.mp4   -> abertura forte (+2)
//   SuspeitaZoom.mp4        -> suspeita (-1)
//   EncerramentoZoom.mp4    -> fechamento durante conversa (-2)
//   HesitacaoZoom.mp4       -> beat 3 hesitação
//   RevelacaoZoom.mp4       -> revelação / vitória
//   derrotazoom.mp4         -> ela sai de frame (derrota final)
//
// Mapeamento delta -> vídeo (regra geral, salvo override):
//   +2 -> aberturaforteZoom
//   +1 -> AberturaZoom
//    0 -> NeutraLoopingZoom
//   -1 -> SuspeitaZoom
//   -2 -> EncerramentoZoom
// =====================================================================

const VIDEO = {
  intro:       "IntroVIFINAL.mp4",
  neutra:      "NeutraLoopingZoom.mp4",
  aberturaLeve:"AberturaZoom.mp4",
  aberturaForte:"aberturaforteZoom.mp4",
  suspeita:    "SuspeitaZoom.mp4",
  encerramento:"EncerramentoZoom.mp4",
  hesitacao:   "HesitacaoZoom.mp4",
  revelacao:   "RevelacaoZoom.mp4",
  derrota:     "derrotazoom.mp4",
};

// Vídeo padrão por delta de confiança
function videoForDelta(delta) {
  if (delta >= 2) return VIDEO.aberturaForte;
  if (delta === 1) return VIDEO.aberturaLeve;
  if (delta === 0) return VIDEO.neutra;
  if (delta === -1) return VIDEO.suspeita;
  return VIDEO.encerramento; // -2
}

// As três posições de opção são sempre, internamente:
//   "vaidade" | "descrenca" | "silencio"
// Mas a ORDEM em que aparecem ao jogador é embaralhada a cada beat.

// ---------------------------------------------------------------------
// INTRO (Beat 0) — primeira parte cortada (já está na legenda do vídeo)
// ---------------------------------------------------------------------
const INTRO = {
  A: [
    "Fui atrás do livro. Os impostos falam — quem sabe ouvir impostos não precisa de espião. Tem uma ala da Cidadela que consome velas, pão e carcereiros sem aparecer em nenhum registro de presos comuns. Chamam de Ala Funda, quando muito, e em voz baixa. O que tem lá dentro, não sei. Mas quem guarda o livro de uma prisão sabe mais do que o homem que guarda a chave — e a chave nunca me interessou.",
    "A mulher se chama Henka. Vinte anos de tinta nos dedos, e come como quem espera que alguém repare. O pão parte devagar. A postura quer ser vista. Esse tipo de orgulho mal guardado é a fresta mais fácil do mundo — basta não ser o décimo a ignorar.",
    "Sentei perto, com o pão de um escriba qualquer. Ela não olhou. Pedi mais água ao moço. Ela não olhou. Queixei-me do preço da pena em voz audível, sem destinar a ninguém. Ela olhou. Disse, para o prato: \"Vinte anos de livro. Entrada e saída de cada alma que passou por esses portões. O que eu sei sobre esta cidade não cabe no cargo que me dão.\""
  ],
  B: [
    "Fui atrás do livro. Os impostos falam — quem sabe ouvir impostos não precisa de espião. Tem uma ala da Cidadela que consome velas, pão e carcereiros sem aparecer em nenhum registro de presos comuns. Chamam de Ala Funda, quando muito, e em voz baixa. O que tem lá dentro, não sei. Mas quem guarda o livro de uma prisão sabe mais do que o homem que guarda a chave — e a chave nunca me interessou.",
    "A mulher se chama Henka. Vinte anos de tinta nos dedos, e come de costas para a sala. O pão some rápido. A postura é de quem quer ser deixada em paz — e ao mesmo tempo não quer. Esse tipo de contradição torna a pessoa mais fácil, não mais difícil. Só precisa que alguém perceba qual dos dois ela quer mais.",
    "Sentei perto, com o pão de um escriba qualquer. Ela não olhou. Comi devagar. Ela continuou sem olhar. Depois de uns minutos, sem que ninguém tivesse dito nada, ela disse para o prato: \"Vinte anos de livro. Entrada e saída de cada alma que passou por esses portões. O que eu sei sobre esta cidade não cabe no cargo que me dão.\""
  ],
  C: [
    "Fui atrás do livro. Os impostos falam — quem sabe ouvir impostos não precisa de espião. Tem uma ala da Cidadela que consome velas, pão e carcereiros sem aparecer em nenhum registro de presos comuns. Chamam de Ala Funda, quando muito, e em voz baixa. O que tem lá dentro, não sei. Mas quem guarda o livro de uma prisão sabe mais do que o homem que guarda a chave — e a chave nunca me interessou.",
    "A mulher se chama Henka. Vinte anos de tinta nos dedos, e come sem provar. O pão some porque precisa desaparecer. Esse tipo de cansaço tem uma vantagem: não precisa de convite. Só precisa de silêncio no lugar certo.",
    "Sentei perto, com o pão de um escriba qualquer. Fiquei em silêncio. Ela ficou em silêncio. Durante um tempo razoável, nós dois ficamos em silêncio juntos, o que, numa cidade que não para de falar de si mesma, tem o efeito de uma conversa. Então ela disse, sem me olhar: \"Vinte anos de livro. Entrada e saída de cada alma que passou por esses portões. O que eu sei sobre esta cidade não cabe no cargo que me dão.\""
  ]
};

// Falas de Toven (iguais para todos os perfis — o que muda é a reação dela)
const TOVEN = {
  beat1: {
    vaidade:   "\"Vinte anos num lugar assim — isso não se compra. A cidade devia ter o nome da senhora numa placa.\" Uma pausa. \"Mas as cidades preferem pedra a gente. Pedra não pede aumento.\"",
    descrenca: "Toven mexe no pão sem comer. \"Toda pessoa que fica tempo suficiente num lugar acha que conhece o lugar.\"",
    silencio:  "Toven bebe devagar. Pousa o copo. Não responde."
  },
  beat2: {
    vaidade:   "\"É sempre assim. Os que sabem ficam embaixo dos que decidem. Os que decidem ficam embaixo dos que pagam. Os que pagam ficam embaixo do próximo problema.\"",
    descrenca: "Toven inclina a cabeça. \"Toda alma? Sempre tem uma que não entra no livro.\"",
    silencio:  "Toven parte um pedaço de pão. Mastiga. Olha para o pátio como quem não está ouvindo."
  },
  beat3: {
    vaidade:   "\"Quem durou vinte anos aqui sabe o que pode falar e o que não pode.\"",
    descrenca: "\"Livro sem lacuna não é livro, é inventário.\"",
    silencio:  "Toven não diz nada. Parte mais um pedaço de pão. Espera."
  },
  beat3_C_especial: {
    vaidade:   "\"Às vezes é mais fácil dizer a um estranho. A gente que conhece a gente já decidiu o que vai achar.\"",
    descrenca: "\"Uma entrada. Pouco, para vinte anos de livro.\"",
    silencio:  "Toven fica parado. Não acena. Não bebe. Espera."
  },
  beat4: {
    vaidade:   "\"Vinte anos carregando isso. Pesa.\"",
    descrenca: "\"Uma cela. Parece pouco, para tanto segredo.\"",
    silencio:  "Toven fica parado. Olha para ela."
  }
};

// =====================================================================
// ÁRVORE DE RESPOSTAS DE HENKA
// =====================================================================
// Estrutura: HENKA[perfil][beat][estadoEntrada][opcao] = {
//   text: "...",          resposta dela
//   delta: número,        mudança de confiança
//   video: VIDEO.x,       (opcional override; senão usa videoForDelta)
//   exitState: "string"   estado de entrada do próximo beat (continuidade)
// }
//
// estadoEntrada do beat 1 é sempre "start".
// =====================================================================

const HENKA = {
  A: {
    1: {
      start: {
        vaidade: {
          text: "Ergue ligeiramente o queixo. \"Devia, sim. E não tem, que é o modo de Redom tratar quem a serve bem.\" Parte o pão com mais cuidado do que o pão precisava. \"Mas eu sei o que sei. E isso não some porque não põem o nome na parede.\"",
          delta: +2,
          exitState: "v"
        },
        descrenca: {
          text: "Pára de mastigar. Olha para Toven pela primeira vez desde que ele se sentou. \"Toda gente, não.\" A voz desce um tom. \"Há os que passam e há os que registam. São coisas diferentes.\"",
          delta: -2,
          exitState: "d"
        },
        silencio: {
          text: "Espera um momento, como quem aguarda o eco de uma pergunta que não chegou. Volta ao prato. \"Bom.\" Diz para o pão, não para ele. \"Pelo menos um que não pergunta logo quanto é que eu ganho.\"",
          delta: -2,
          exitState: "s"
        }
      }
    },
    2: {
      v: {
        _henkaIntro: "\"Sabe o que é guardar o livro de entrada desta Cidadela há vinte anos? Sei quem entrou algemado e quem entrou a cavalo. Sei mais de Redom do que o conselho, e ganho menos que um cavalariço.\"",
        vaidade: {
          text: "\"Exatamente.\" Acena com a cabeça com a satisfação de quem finalmente foi compreendido. \"Os que decidem precisam dos que sabem, e fingem que não precisam, porque admitir seria pagar melhor.\" Faz uma pausa. \"Mas o livro é meu. E o que está no livro fica comigo.\"",
          delta: -2,
          video: VIDEO.suspeita,
          exitState: "ok"
        },
        descrenca: {
          text: "Pára. Foi um instante curto, e foi tudo. Quando volta a falar, a voz tinha descido. \"Há sempre, sim.\" Olha para o copo. \"Uma.\"",
          delta: +2,
          exitState: "ok"

<script>
// =====================================================================
// MOTOR DE JOGO
// =====================================================================

const els = {
  title:    document.getElementById('title'),
  startBtn: document.getElementById('startBtn'),
  ui:       document.getElementById('ui'),
  eyebrow:  document.getElementById('eyebrow'),
  content:  document.getElementById('content'),
  choices:  document.getElementById('choices'),
  advance:  document.getElementById('advance'),
  ending:   document.getElementById('ending'),
  verdict:  document.getElementById('verdict'),
  endHenka: document.getElementById('endHenka'),
  endSael:  document.getElementById('endSael'),
  againBtn: document.getElementById('againBtn'),
  skip:     document.getElementById('skip'),
  vidIntro: document.getElementById('vidIntro'),
  vidA:     document.getElementById('vidA'),
  vidB:     document.getElementById('vidB'),
  ambient:  document.getElementById('ambient'),
};

// controlo de som ambiente
// O ambient toca em loop contínuo após a intro.
// Os vídeos de react têm som próprio (não muted).
// Quando toca um react: ambient faz fade out.
// Quando volta ao neutral: ambient faz fade in.
let ambientFadeTimer = null;

function startAmbient(){
  const a = els.ambient;
  a.volume = 0;
  const p = a.play();
  if (p && p.catch) p.catch(()=>{});
  fadeAmbientTo(1, 1200);
}

function fadeAmbientTo(target, duration){
  clearInterval(ambientFadeTimer);
  const a = els.ambient;
  const start = a.volume;
  const diff = target - start;
  const steps = 30;
  const interval = duration / steps;
  let step = 0;
  ambientFadeTimer = setInterval(()=>{
    step++;
    a.volume = Math.max(0, Math.min(1, start + diff * (step / steps)));
    if (step >= steps) clearInterval(ambientFadeTimer);
  }, interval);
}

function ambientDuck(){  fadeAmbientTo(0, 400); }  // fade out rápido ao iniciar react
function ambientRestore(){ fadeAmbientTo(1, 800); } // fade in suave ao voltar ao neutral

// estado de jogo
let game = {
  profile: null,      // 'A' | 'B' | 'C'
  confidence: 0,
  beat: 0,
  entryState: 'start',
  retry: false,
};
window.game = game; // exposto para depuração/testes (inofensivo)

// gestão de vídeo com crossfade entre dois elementos <video>
let activeVid = els.vidA;
let idleVid   = els.vidB;
els.vidA.style.opacity = '0';  // começa invisível — intro cobre tudo
els.vidB.style.opacity = '0';
els.vidA.style.transition = 'opacity 0.6s ease';
els.vidB.style.transition = 'opacity 0.6s ease';

// token de geração — incrementado a cada playVideo.
// Qualquer onEnd de uma chamada anterior é ignorado se o token mudou.
let videoGen = 0;

// toca um vídeo. loop=true mantém em ciclo (estado neutro).
// onEnd: callback quando termina (para vídeos one-shot).
// Robustez: se o vídeo falhar a carregar ou não disparar 'ended',
// um timeout de segurança garante que onEnd é chamado na mesma.
function playVideo(src, { loop=false, onEnd=null, hold=true, maxWait=14000 } = {}){
  const myGen = ++videoGen; // token desta chamada

  const next = idleVid;
  const cur  = activeVid;

  // cancela qualquer playback pendente no elemento que vamos usar
  next.pause();
  next.removeAttribute('src');
  next.load();

  next.src = src;
  next.loop = loop;
  next.currentTime = 0;

  let done = false;
  const finish = () => {
    if (done) return;
    done = true;
    next.removeEventListener('ended', onEndedHandler);
    next.removeEventListener('error', onErrorHandler);
    clearTimeout(safety);
    // só executa o callback se ainda for o vídeo mais recente
    if (onEnd && myGen === videoGen) onEnd();
  };
  const onEndedHandler = () => finish();
  const onErrorHandler = () => { if (onEnd && myGen === videoGen) finish(); };

  if (!loop){
    next.addEventListener('ended', onEndedHandler);
    next.addEventListener('error', onErrorHandler);
  }

  // timeout de segurança: nunca deixa o jogo preso num vídeo
  const safety = (!loop && onEnd)
    ? setTimeout(finish, maxWait)
    : null;

  const startPlayback = () => {
    if (myGen !== videoGen) return; // já foi substituído, não inicia
    const p = next.play();
    if (p && p.catch) p.catch(()=>{
      // autoplay bloqueado ou ficheiro inválido — segue em frente
      if (!loop && onEnd && myGen === videoGen) finish();
    });
    next.style.opacity = '1';
    cur.style.opacity  = '0';
    activeVid = next;
    idleVid   = cur;
  };

  if (next.readyState >= 2){
    startPlayback();
  } else {
    next.addEventListener('loadeddata', startPlayback, { once:true });
    next.addEventListener('error', () => {
      // se nem carrega, ainda assim avança
      if (!loop && onEnd) finish();
    }, { once:true });
    next.load();
  }
}

// toca a neutra em loop (estado de espera enquanto o jogador lê)
function playNeutral(){
  playVideo(VIDEO.neutra, { loop:true });
  ambientRestore(); // som ambiente volta ao volume normal
}

// ---------------------------------------------------------------
// FLUXO
// ---------------------------------------------------------------

function pickProfile(){
  const profiles = ['A','B','C'];
  return profiles[Math.floor(Math.random()*profiles.length)];
}

function startGame(){
  game.profile = pickProfile();
  game.confidence = CONFIG.confiancaInicial;
  game.beat = 0;
  game.entryState = 'start';
  game.retry = false;

  els.title.style.opacity = '0';
  setTimeout(()=>{ els.title.classList.add('hidden'); }, 1200);

  playIntroVideo();
}

// 1) vídeo de introdução — com som, elemento dedicado
function playIntroVideo(){
  els.ui.classList.add('hidden');
  els.skip.classList.remove('hidden');

  // garante que vidA/vidB estão silenciosos e invisíveis
  els.vidA.style.opacity = '0';
  els.vidB.style.opacity = '0';

  const vi = els.vidIntro;
  vi.src = VIDEO.intro;
  vi.style.opacity = '1';
  vi.currentTime = 0;

  let done = false;
  const finish = () => {
    if (done) return;
    done = true;
    clearTimeout(safety);
    vi.removeEventListener('ended', finish);
    // fade out do intro, prepara transição para expressões
    vi.style.opacity = '0';
    setTimeout(()=>{ vi.src = ''; showIntroText(); }, 800);
  };
  vi.addEventListener('ended', finish);
  const safety = setTimeout(finish, 90000); // segurança: 90s max

  const p = vi.play();
  if (p && p.catch) p.catch(()=> finish());

  els.skip.onclick = ()=>{
    vi.pause();
    finish();
  };
}

// 2) tela com texto de introdução (varia por perfil), sobre vídeo neutro
function showIntroText(){
  els.skip.classList.add('hidden');

  // inicia o som ambiente em fade in
  startAmbient();

  // inicializa os vídeos de expressão (muted) com opacidades corretas
  els.vidA.style.opacity = '1';
  els.vidB.style.opacity = '0';
  activeVid = els.vidA;
  idleVid   = els.vidB;

  playNeutral();
  els.ui.classList.remove('hidden');

  const lines = INTRO[game.profile];
  let idx = 0;

  els.eyebrow.textContent = 'Sael, o Tecelão';
  els.choices.innerHTML = '';
  els.choices.classList.add('hidden');

  const renderLine = ()=>{
    els.content.innerHTML = `<p class="narration fade-text">${lines[idx]}</p>`;
    els.advance.classList.remove('hidden');
    els.advance.textContent = (idx < lines.length-1) ? 'continuar' : 'começar';
  };

  renderLine();

  els.advance.onclick = ()=>{
    idx++;
    if (idx < lines.length){
      renderLine();
    } else {
      els.advance.classList.add('hidden');
      els.choices.classList.remove('hidden');
      game.beat = 1;
      game.entryState = 'start';
      renderBeat();
    }
  };
}

// shuffle utilitário
function shuffle(arr){
  const a = arr.slice();
  for (let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// 3) renderiza um beat: intro de Henka (se houver) + 3 opções
function renderBeat(){
  const beatData = HENKA[game.profile][game.beat][game.entryState];
  if (!beatData){
    console.error('Beat não encontrado', game);
    return;
  }

  els.eyebrow.textContent = `Henka  ·  o pátio`;
  els.advance.classList.add('hidden');

  // monta a parte introdutória (Toven responde + fala de Henka)
  let introHTML = '';
  if (beatData._tovenResponde){
    introHTML += `<p class="narration">${beatData._tovenResponde}</p>`;
  }
  if (beatData._henkaIntro){
    introHTML += `<p class="henka">${beatData._henkaIntro}</p>`;
  }
  els.content.innerHTML = introHTML
    ? `<div class="fade-text">${introHTML}</div>`
    : '';

  // escolhe o conjunto de falas de Toven
  let tovenSet = TOVEN['beat'+game.beat];
  if (game.beat === 3 && beatData._useSpecialToven){
    tovenSet = TOVEN.beat3_C_especial;
  }

  // monta as 3 opções, embaralhadas
  const keys = shuffle(['vaidade','descrenca','silencio']);
  els.choices.innerHTML = '';
  els.choices.classList.remove('hidden');

  keys.forEach(key=>{
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.innerHTML = tovenSet[key];
    btn.onclick = ()=> chooseOption(key, beatData[key], tovenSet[key]);
    els.choices.appendChild(btn);
  });
}

// 4) jogador escolheu — mostra resultado + vídeo, depois avança
function chooseOption(key, outcome, tovenLine){
  els.choices.classList.add('hidden');

  // aplica delta
  game.confidence += outcome.delta;

  // vídeo: override ou por delta
  const vid = outcome.video || videoForDelta(outcome.delta);

  // duck do som ambiente durante o react
  ambientDuck();

  // mostra fala de Toven + resposta de Henka
  els.content.innerHTML = `
    <div class="fade-text">
      <p class="toven-line">${tovenLine}</p>
      <p class="henka">${outcome.text}</p>
    </div>`;

  // toca o vídeo de reação; ao terminar, volta a neutra e mostra "continuar"
  const isClosing = (outcome.exitState === 'fail');
  playVideo(vid, {
    loop:false,
    onEnd: ()=>{
      if (!isClosing) playNeutral();
    }
  });

  els.advance.classList.remove('hidden');
  els.advance.textContent = 'continuar';
  els.advance.onclick = ()=> advanceFrom(outcome);
}

// 5) decide o próximo passo a partir do exitState
function advanceFrom(outcome){
  const exit = outcome.exitState;

  // fecha forte no meio da conversa -> derrota imediata
  if (exit === 'fail'){
    return showEnding('derrota');
  }

  // fim do beat 4 -> desfecho conforme confiança
  if (exit === 'end'){
    return resolveEnding();
  }

  // avança beat e define entrada
  game.beat += 1;
  game.entryState = exit;
  renderBeat();
}

// 6) resolve o desfecho final após beat 4
function resolveEnding(){
  if (game.confidence >= CONFIG.confiancaVitoria){
    showEnding('vitoriaCompleta');
  } else {
    showEnding('derrota');
  }
}

// 7) tela de desfecho
function showEnding(type){
  const end = ENDINGS[type];
  const isWin = (type !== 'derrota');

  els.advance.classList.add('hidden');
  els.choices.classList.add('hidden');
  els.ui.classList.add('hidden');

  const revealEndScreen = () => {
    els.ending.style.display = 'flex';
    els.ending.className = isWin ? 'win' : 'lose';

    els.verdict.textContent = isWin
      ? 'O que vim buscar — e mais'
      : 'A mesa esvazia-se';

    els.endHenka.innerHTML = end.henka.replace(/\n\n/g,'<br><br>');
    els.endSael.textContent = end.sael;

    requestAnimationFrame(()=>{ els.ending.style.opacity = '1'; });
  };

  if (isWin) {
    // vitória: toca o vídeo e mostra a tela após um beat
    ambientDuck();
    playVideo(end.video, { loop:false });
    setTimeout(revealEndScreen, 3200);
  } else {
    // derrota: espera o vídeo TERMINAR por completo, depois mostra a tela
    ambientDuck();
    playVideo(end.video, {
      loop: false,
      onEnd: () => { setTimeout(revealEndScreen, 600); }
    });
  }
}

function restart(){
  els.ending.style.opacity = '0';
  ambientRestore();
  setTimeout(()=>{
    els.ending.style.display = 'none';
    els.endHenka.classList.remove('fade-text');
    els.endSael.classList.remove('fade-text');
    void els.endHenka.offsetWidth;
    els.endHenka.classList.add('fade-text');
    els.endSael.classList.add('fade-text');
    startGame();
  }, 1400);
}

// ---------------------------------------------------------------
// EVENTOS
// ---------------------------------------------------------------
els.startBtn.onclick = startGame;
els.againBtn.onclick = restart;

// pré-carrega a neutra para transição suave
els.vidB.src = VIDEO.neutra;
els.vidB.load();
</script>
